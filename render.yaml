services:
  - type: web
    name: devpulse
    runtime: node
    buildCommand: npm install && npm run build && npm install --prefix server
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        fromValue: ${MONGO_URI}
      - key: SESSION_SECRET
        fromValue: ${SESSION_SECRET}
      - key: JWT_SECRET
        fromValue: ${JWT_SECRET}
      - key: GITHUB_CLIENT_ID
        fromValue: ${GITHUB_CLIENT_ID}
      - key: GITHUB_CLIENT_SECRET
        fromValue: ${GITHUB_CLIENT_SECRET}
      - key: GITHUB_CALLBACK_URL
        fromValue: ${GITHUB_CALLBACK_URL}
      - key: GROQ_API_KEY
        fromValue: ${GROQ_API_KEY}
      - key: CLIENT_URL
        fromValue: ${CLIENT_URL}
      - key: VITE_API_URL
        fromValue: ${VITE_API_URL}
